<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>휘찬의 AI 포트폴리오</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; font-family: sans-serif; }
        
        /* 배경 슬라이더 */
        .swiper { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.5); }

        /* 입력창 영역 - 최상단 레이어 보장 */
        #chat-box {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 9999999 !important; 
            background: white; padding: 12px 25px;
            border-radius: 50px; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            width: 80%; max-width: 400px; 
            display: flex; align-items: center;
        }
        
        #userInput { 
            flex: 1; border: none; outline: none; font-size: 18px; 
            background: transparent; color: #333;
        }

        #sendBtn {
            background: #007AFF; color: white; border: none; 
            padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold;
        }

        /* 버튜버 위치 및 클릭 설정 */
        #live2d-widget { pointer-events: none !important; } 
        /* 말풍선(dialog)은 클릭과 표시가 가능해야 함 */
        .live2d-widget-dialog-container { pointer-events: auto !important; opacity: 1 !important; }
    </style>
</head>
<body>

    <div class="swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="https://via.placeholder.com/800x1200?text=서울대+공연"></div>
            <div class="swiper-slide"><img src="https://via.placeholder.com/800x1200?text=학생회+활동"></div>
            <div class="swiper-slide"><img src="https://via.placeholder.com/800x1200?text=IT+프로젝트"></div>
        </div>
    </div>

    <div id="chat-box">
        <input type="text" id="userInput" placeholder="질문 후 엔터를 누르세요!" />
        <button id="sendBtn">전송</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/live2d-widget@3.1.4/lib/L2Dwidget.min.js"></script>

    <script>
        // 1. 모델 초기화 (에러 방지를 위해 설정 강화)
        window.onload = function() {
            L2Dwidget.init({
                "model": { "jsonPath": "https://cdn.jsdelivr.net/gh/evrstr/live2d-widget-models/live2d_evrstr/koharu/model.json" },
                "display": { "position": "right", "width": 150, "height": 300, "hOffset": 20, "vOffset": -20 },
                "mobile": { "show": true },
                "dialog": { "enable": true, "script": { 'every idle 10s': '휘찬님에 대해 물어봐!' } }
            });
        };

        // 2. 슬라이더 실행
        const swiper = new Swiper('.swiper', { loop: true, autoplay: { delay: 5000 } });

        // 3. 질문 로직 (강력한 디버깅 포함)
        function askAI() {
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            
            if(!val) return;

            // [디버깅] 만약 이 메시지가 안 뜬다면 코드가 수정 안 된 겁니다!
            console.log("입력된 값:", val);

            let result = `'${val}'에 대해 잘 모르겠어요. 다시 물어봐 주세요!`;

            if(val.includes("대학") || val.includes("학교")) {
                result = "윤휘찬님은 서울대학교 음악대학에 재학 중입니다! 🎓";
            } else if(val.includes("전공") || val.includes("악기")) {
                result = "현재 클래식 기타 연주를 하고 있어요! 🎻";
            } else if(val.includes("꿈")) {
                result = "지구 정복입니다! 💼";
            }

            // 캐릭터에게 말 시키기
            try {
                L2Dwidget.showTextMessage(result, 4000);
            } catch (e) {
                // 라이브러리 오류 시 대안으로 알림창 띄우기
                alert(result);
            }

            input.value = ""; // 입력창 비우기
        }

        // 엔터키 및 버튼 이벤트 바인딩
        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') askAI();
        });
        document.getElementById('sendBtn').addEventListener('click', askAI);
    </script>
</body>
</html>
